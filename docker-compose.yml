services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        ollama serve &
        until ollama list > /dev/null 2>&1; do
          sleep 1
        done
        ollama pull qwen2.5:7b
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 150s
      timeout: 100s
      retries: 10
      start_period: 300s
volumes:
  ollama_data:
