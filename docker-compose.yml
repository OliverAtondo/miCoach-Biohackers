services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        ollama serve &
        until curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; do
          sleep 1
        done
        ollama pull qwen2.5:7b
        wait
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
volumes:
  ollama_data:
